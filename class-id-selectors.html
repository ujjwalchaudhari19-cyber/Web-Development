<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="class-id-selectors.css">
    <meta charset="UTF-8">
    <title>Class and id selectors</title>
  </head>

  <body>
    <div class="number1">
      <p>Number 1- I'm a class!</p>
    </div>

    <div id="number2">
      <p>Number 2- I'm one ID</p>
    </div>

    <div class="number3" id="number3">
      <p>Number 3- I'm class, but cooler!</p>
    </div>

    <div id="number4">
      <p>Number 4- I'm another ID</p>
    </div>

    <div class="number5">
      <p>Number 5- I'm class</p>
    </div>
  </body>
</html>
