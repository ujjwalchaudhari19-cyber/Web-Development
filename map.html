<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Map Method</title>
  </head>

  <body>
    <p><h3>Array method 1</h3></p>

    <script>
      function addOne(num){
        return num + 1;
      }

      const arr=[1,2,3,4,5];
      const mappedArr= arr.map(addOne); 
      console.log(mappedArr);
      // When to use map:
      // When you want to transform every element and get a new array as well as the original array back.
      // map makes the code look clean and readable
    </script>

  </body>
</html>
