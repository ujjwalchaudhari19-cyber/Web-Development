<!DOCTYPE html>
<html>
  <head>
    <title>Strings</title>
  </head>

  <body>
    <h1>String Methods in JS</h1>    

    <script>
      let text="ujjwal";
      let char=text.charAt(0);
      console.log(char);
      
      char=text.codePointAt(1);
      console.log(char);

      let name="Ujjwal"
      let letter=text.at(1);
      console.log(letter);

      let text1="Hello";
      let text2="World!"; 
      let text3=text1.concat(" ",text2);
      console.log(text3);

      text="Apple, Banana, Kiwi"
      let part1=text.slice(7,13);
      let part2=text.slice(7);
      let part3=text.slice(-12);
      let part4=text.slice(-12,-6);
      console.log(part1);
      console.log(part2);
      console.log(part3);
      console.log(part4);

      let str="Apple, Banana, Kiwi"
      let part=str.substring(7,13);
      console.log(part);

      text="ujjwal";
      text2=text.toUpperCase();
      console.log(text2);

      text="UJJWAL";
      text2=text.toLowerCase();
      console.log(text2);

      text="  Yo Wassup  ";
      text2=text.trim();
      console.log(text2);
      
      text="  Yo Wassup  ";
      text2=text.trimStart();
      console.log(text2);

      text="  Yo Wassup  ";
      text2=text.trimEnd();
      console.log(text2)

      text="Hi";
      let padded=text.padStart(5,"*");
      console.log(padded);

      text="Hi";
      padded=text.padEnd(5,"*");
      console.log(padded);
    </script>
  </body>
</html>
